services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=...
      - JWT_SECRET=...
      - PORT=5000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://54.161.149.107:5000
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"   # ✅ enable browser access
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "4000:3000"   # ✅ correct mapping (NOT 4001:4000)

  node-exporter:
    image: prom/node-exporter
    # ❌ NO PORTS (avoid conflict)